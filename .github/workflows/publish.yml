name: Publish
on:
  push:
    tags: [v*]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install -g npm@latest
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn prepare
      - name: Resolve npm dist-tag
        run: |
          tag=$(node -p "const version = require('./package.json').version; const match = version.match(/^[^-]+-([0-9A-Za-z]+)(?:[.-].*)?$/); match ? match[1] : 'latest'")
          echo "NPM_PUBLISH_TAG=$tag" >> "$GITHUB_ENV"
      - run: npm publish --access public --ignore-scripts --tag "$NPM_PUBLISH_TAG"
